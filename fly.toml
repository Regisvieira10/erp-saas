app = "erp-saas-prod"
kill_signal = "SIGINT"
kill_timeout = 30
processes = []

[build]
  builder = "nixpacks"

[env]
  PORT = "3001"
  NODE_ENV = "production"

[deploy]
  strategy = "immediate"

[metadata]
  fly_launched_by = "opencode"

[[services]]
  http_checks = []
  internal_port = 3001
  processes = ["app"]
  protocol = "tcp"

  [[services.ports]]
    port = 80

  [[services.ports]]
    handlers = ["tls", "http"]
    port = 443

  [[services.tcp_checks]]
    grace_period = "1s"
    interval = "15s"
    restart_limit = 6
    timeout = "2s"