app = "erp-saas"
kill_signal = "SIGINT"
kill_timeout = 5
processes = []

[build]
  builder = "docker"
  image = "node:18"

[build.args]
  NODE_ENV = "production"

[env]
  PORT = "3001"

[deploy]
  strategy = "immediate"
  release_command = "npx prisma generate"

[[services]]
  http_checks = []
  internal_port = 3001
  processes = ["app"]
  protocol = "tcp"
  script_path = null

  [[services.conditions]]
    port = 8080

  [services.concurrency]
    hard_limit = 25
    soft_limit = 20
    type = "connections"

  [[services.ports]]
    force_https = true
    handlers = ["http"]
    port = 80

  [[services.ports]]
    handlers = ["tls", "http"]
    port = 443

  [[services.tcp_checks]]
    grace_period = "1s"
    interval = "15s"
    restart_limit = 6
    timeout = "2s"

[experimental]
  allow_privilege = false
  cmd = ["node", "dist/main.js"]
  entrypoint = []

[processes]
  app = "node dist/main.js"